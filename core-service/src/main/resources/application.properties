spring.application.name=demo
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/survey_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Email OTP configuration
brevo.api-key=${BREVO_API_KEY}
brevo.from-email=${BREVO_FROM_EMAIL}
brevo.from-name=${BREVO_FROM_NAME:Khao Sat Thong Minh}
brevo.api-url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}

# JWT configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=3600000

# VNPay configuration
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.payUrl=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.returnUrl=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
vnpay.ipnUrl=${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}
vnpay.frontendReturnUrl=${FRONTEND_RETURN_URL:http://localhost:5173/payment-result}

# Cloudinary configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Multipart upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# AI Service configuration
ai.service.analyze-url=${AI_ANALYZE_URL:http://localhost:5000/api/analyze-response}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
